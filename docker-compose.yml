        umask 022
        mkdir -p /var/log/p0f
        touch /var/log/p0f/linux.log
        chmod 644 /var/log/p0f/linux.log
        exec /opt/p0f/p0f -i "$P0F_INTERFACE" -p -o /var/log/p0f/linux.log "${LINUX_FILTER}"
