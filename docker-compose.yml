      - NET_RAW
    read_only: true
    volumes:
      - ./p0f_logs:/var/log/p0f:rw
    environment:
      - P0F_INTERFACE=${P0F_INTERFACE:-eno1}
      - LINUX_FILTER=${LINUX_FILTER}
