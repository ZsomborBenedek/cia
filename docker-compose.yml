      - |
        umask 022
        mkdir -p /var/log/p0f
        touch /var/log/p0f/spoofed.log
        chmod 644 /var/log/p0f/spoofed.log
        exec /opt/p0f/p0f -i "$P0F_INTERFACE" -p -o /var/log/p0f/spoofed.log "${SPOOFED_FILTER}"
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  
  p0f_other:
    image: dtagdevsec/p0f:24.04.1
    container_name: p0f_other
