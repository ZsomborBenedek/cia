      - |
        umask 022
        mkdir -p /var/log/p0f
        touch /var/log/p0f/iot.log
        chmod 644 /var/log/p0f/iot.log
        exec /opt/p0f/p0f -i "$P0F_INTERFACE" -p -o /var/log/p0f/iot.log "${IOT_FILTER}"
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  
  p0f_spoofed:
    image: dtagdevsec/p0f:24.04.1
    container_name: p0f_spoofed
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    read_only: true
    volumes:
      - ./p0f_logs:/var/log/p0f:rw
    environment:
      - P0F_INTERFACE=${P0F_INTERFACE:-eno1}
