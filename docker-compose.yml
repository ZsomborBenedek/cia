    read_only: true
    volumes:
      - ./p0f_logs:/var/log/p0f:rw
    environment:
      - P0F_INTERFACE=${P0F_INTERFACE:-eno1}
      - OTHER_FILTER=${OTHER_FILTER}
    command:
      - /bin/sh
      - -c
      - |
        umask 022
        mkdir -p /var/log/p0f
        touch /var/log/p0f/other.log
        chmod 644 /var/log/p0f/other.log
        exec /opt/p0f/p0f -i "$P0F_INTERFACE" -p -o /var/log/p0f/other.log "${OTHER_FILTER}"
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

  # ---------------------------------------------------------------------
  # Logrotate sidecar: rotates p0f logs daily (copytruncate to avoid restart)
  # ---------------------------------------------------------------------
  logrotate_p0f:
    image: blacklabelops/logrotate:latest
    container_name: logrotate_p0f
    volumes:
      - ./p0f_logs:/var/log/p0f
    environment:
      - LOGS_DIRECTORIES=/var/log/p0f
      - LOGROTATE_INTERVAL=daily
      - CRON_SCHEDULE=0 0 * * *
      - LOGROTATE_OLDDIR=/var/log/p0f/old
      - LOGROTATE_COMPRESSION=compress
      - LOGROTATE_COPIES=7
      - TZ=UTC
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

