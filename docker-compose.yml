services:
  # =====================================================================
  # P0F Windows Monitor
  # =====================================================================

  p0f_windows:
    image: dtagdevsec/p0f:24.04.1
    container_name: p0f_windows
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    read_only: true
    volumes:
      - ./p0f_logs:/var/log/p0f:rw
    environment:
      - P0F_INTERFACE=${P0F_INTERFACE:-eno1}
      - WINDOWS_FILTER=${WINDOWS_FILTER}
    command:
      - /bin/sh
      - -c
      - |
        umask 022
        mkdir -p /var/log/p0f
        touch /var/log/p0f/windows.log
        chmod 644 /var/log/p0f/windows.log
        exec /opt/p0f/p0f -i "$P0F_INTERFACE" -p -o /var/log/p0f/windows.log "${WINDOWS_FILTER}"
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

  # =====================================================================
  # TCPDUMP Capture for Windows
  # Captures raw packets using the *same filter* as p0f_legit
  # =====================================================================

  tcpdump_windows:
    image: nicolaka/netshoot
    container_name: tcpdump_windows
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    read_only: true
    volumes:
      - ./raw_logs:/pcap:rw # Separate directory for pcap files
    environment:
      - P0F_INTERFACE=${P0F_INTERFACE:-eno1}
      - WINDOWS_FILTER=${WINDOWS_FILTER} # <-- Uses the same filter
    command:
      - /bin/sh
      - -c
      - |
        umask 022
        mkdir -p /pcap
        touch /pcap/windows.pcap
        chmod 644 /pcap/windows.pcap
        # -U = unbuffered, so the file writes in real-time
        exec tcpdump -i "$P0F_INTERFACE" -p -U -w /pcap/windows.pcap "${WINDOWS_FILTER}"
    restart: unless-stopped
    # user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

