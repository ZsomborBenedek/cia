services:
  # =====================================================================
  # P0F Passive OS Fingerprinting - Three targeted monitors
  # BPF filter syntax used: host <IP> and net <subnet>
  # Log files rotate daily using a sidecar logrotate container.
  # =====================================================================

  p0f_windows:
    image: dtagdevsec/p0f:24.04.1
    container_name: p0f_windows
    network_mode: "host" # required for sniffing host interface
    cap_add:
      - NET_ADMIN
      - NET_RAW
    read_only: true
    volumes:
      - ./p0f_logs:/var/log/p0f:rw
    environment:
      - P0F_INTERFACE=${P0F_INTERFACE:-eno1}
      - WINDOWS_FILTER=${WINDOWS_FILTER}
    command:
      - /bin/sh
      - -c
      - |
        umask 022
        mkdir -p /var/log/p0f
        touch /var/log/p0f/windows.log
        chmod 644 /var/log/p0f/windows.log
        exec /opt/p0f/p0f -i "$P0F_INTERFACE" -p -o /var/log/p0f/windows.log "${WINDOWS_FILTER}"
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

  p0f_linux:
    image: dtagdevsec/p0f:24.04.1
    container_name: p0f_linux
    network_mode: "host"
    cap_add:
